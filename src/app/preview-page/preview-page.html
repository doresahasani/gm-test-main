<div class="preview-wrapper">
  <div class="preview-form-card">
    <div class="preview-header">
      <div>
        <div class="preview-badge">Gesundheitsdeklaration</div>
        <h1>Health Records</h1>
        <p>Select one record to open its full form in a separate page.</p>
      </div>

      <button type="button" class="back-btn" (click)="goBack()">
        ← Back
      </button>
    </div>

    <div *ngIf="error" class="error-box">
      {{ error }}
    </div>

    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (ngModelChange)="onSearchChange()"
        placeholder="Search by ID, provider or date"
      />
    </div>

    <div *ngIf="filteredForms.length === 0" class="state-box">
      No records found.
    </div>

    <div *ngIf="filteredForms.length > 0" class="records-list">
      <div class="records-head">
        <div>ID</div>
        <div>Provider</div>
        <div>Date</div>
        <div></div>
      </div>

      <div
        class="record-item"
        *ngFor="let form of filteredForms; trackBy: trackByForm"
      >
        <div class="record-summary">
          <div class="record-id">#{{ form.id }}</div>
          <div class="record-provider">{{ getProvider(form) }}</div>
          <div class="record-date">{{ formatDateOnly(form.createdAt) }}</div>

          <div class="menu-wrap" (click)="onMenuClick($event)">
            <button
              type="button"
              class="menu-btn"
              (click)="toggleMenu($event, form.id)"
              title="Open menu"
            >
              ⋮
            </button>

            <div *ngIf="openMenuId === form.id" class="action-menu">
              <button type="button" class="action-item" (click)="viewRecord(form, $event)">
                <span class="action-icon">👁</span>
                <span>View</span>
              </button>

              <button type="button" class="action-item" (click)="editRecord(form, $event)">
                <span class="action-icon">✎</span>
                <span>Edit</span>
              </button>

              <button
                type="button"
                class="action-item action-item--danger"
                (click)="deleteRecord(form, $event)"
                [disabled]="deletingId === form.id"
              >
                <span class="action-icon">🗑</span>
                <span>{{ deletingId === form.id ? 'Deleting...' : 'Delete' }}</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
