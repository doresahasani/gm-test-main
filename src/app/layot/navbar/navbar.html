<header class="header">
  <div class="page header__inner">
    <h4
      style="
        font-family: Roboto, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
        font-size: 24px;
        font-weight: 400;
      "
    >
      Gesundheitsdeklaration
    </h4>

    <div class="menu">
      <button
        type="button"
        class="menu__btn"
        aria-label="Menü öffnen"
        aria-haspopup="menu"
        [attr.aria-expanded]="menuOpen()"
        (click)="$event.stopPropagation(); toggleMenu()"
      >
        <img
          alt=""
          height="20"
          src="assets/menu-buton.svg"
          width="20"
        />
      </button>

      <div
        class="dropdown"
        role="menu"
        [class.open]="menuOpen()"
        (click)="$event.stopPropagation()"
      >
        <button routerLink="/preview" class="nav-btn" (click)="closeMenu()">
          Preview
        </button>
      </div>
    </div>
  </div>
</header>
